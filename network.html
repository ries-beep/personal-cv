<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #0a0a0a;
            --nav-gray: #1a1a1a;
            --cyber-red: #ff0000;
            --cyber-gray: #333333;
            --text-white: #ffffff;
            --panel-bg: rgba(20, 20, 20, 0.95);
            --border-red: #4d0000;
            --glow-red: rgba(255, 0, 0, 0.4);
        }

        body,
        html {
            background-color: var(--bg-black);
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 3px 100%;
            color: var(--text-white);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .steam-nav {
            background-color: var(--nav-gray);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 5%;
            border-bottom: 2px solid var(--cyber-red);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }

        .nav-content {
            display: flex;
            gap: 25px;
            text-transform: uppercase;
            font-size: 13px;
            font-weight: bold;
        }

        .nav-item {
            color: #a0a0a0;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-item:hover {
            color: var(--cyber-red);
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-red);
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: var(--text-white);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .social-card:hover {
            border-color: var(--cyber-red);
            box-shadow: 0 0 20px var(--glow-red);
            transform: translateY(-5px);
            background: rgba(40, 0, 0, 0.2);
        }

        .social-card i {
            font-size: 40px;
            color: var(--cyber-red);
        }

        .social-card span {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Contact Box Section */
        .contact-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-red);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.1);
        }

        .panel-header {
            font-size: 14px;
            color: var(--cyber-red);
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-red);
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255, 0, 0, 0.05);
        }

        .panel-body {
            padding: 25px;
        }

        .contact-row {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .contact-label {
            color: var(--cyber-red);
            min-width: 100px;
            font-weight: bold;
        }

        .contact-value {
            color: #ccc;
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav class="steam-nav">
        <div class="nav-content">
            <span class="nav-item" onclick="window.location.href='projects.html';">Projects</span>
            <span class="nav-item" style="color: var(--cyber-red);">[Network]</span>
            <span class="nav-item" onclick="window.location.href='index.html';">Profile</span>
            <span class="nav-item" onclick="window.location.href='cv.html';">Cv</span>
        </div>
    </nav>

    <div class="container">

        <div class="card-grid">
            <a href="https://github.com/ries-beep" target="_blank" class="social-card">
                <i class="fa-brands fa-github"></i>
                <span>GitHub</span>
            </a>
            <a href="https://www.facebook.com/rienan.sibayan" target="_blank" class="social-card">
                <i class="fa-brands fa-facebook-f"></i>
                <span>Facebook</span>
            </a>
            <a href="https://www.linkedin.com/in/john-rienan-balarbar-sibayan-36b4a4258/" target="_blank"
                class="social-card">
                <i class="fa-brands fa-linkedin-in"></i>
                <span>LinkedIn</span>
            </a>
        </div>

        <div class="contact-panel">
            <div class="panel-header">> Decrypting_Contact_Data...</div>
            <div class="panel-body">
                <div class="contact-row">
                    <span class="contact-label">EMAIL:</span>
                    <span class="contact-value">jriensibayan@gmail.com</span>
                </div>
                <div class="contact-row">
                    <span class="contact-label">PHONE:</span>
                    <span class="contact-value">+63 9XX XXX XXXX</span>
                </div>
                <div class="contact-row">
                    <span class="contact-label">STATUS:</span>
                    <span class="contact-value" style="color: #00ff00;">Silent Mode</span>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
